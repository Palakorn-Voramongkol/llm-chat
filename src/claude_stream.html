<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Stream</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #0d0d18;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #e0e0ff;
      }
      .stream-app {
        display: flex; flex-direction: column;
        height: 100vh;
      }
      .stream-header {
        display: flex; align-items: center; gap: 8px;
        padding: 6px 12px;
        background: #0f0f23;
        border-bottom: 1px solid #3a3a5c;
        min-height: 32px;
      }
      .stream-title {
        font-size: 11px; font-weight: 600;
        color: #a78bfa; letter-spacing: 0.5px;
        flex: 1;
      }
      .tool-btn {
        height: 22px; border: none; border-radius: 4px;
        background: rgba(255,255,255,0.06); color: #8888bb;
        font-size: 10px; cursor: pointer; padding: 0 8px;
        transition: all 0.15s ease; white-space: nowrap;
      }
      .tool-btn:hover { background: rgba(255,255,255,0.12); color: #e0e0ff; }
      .tool-btn.danger:hover { background: rgba(231,76,60,0.3); color: #e74c3c; }
      .stream-content {
        flex: 1;
        overflow-y: auto;
        padding: 8px 12px;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #e0e0ff;
        user-select: text;
      }
      .qa-entry { margin-bottom: 12px; }
      .qa-label { font-weight: 700; color: #7c6aff; margin-right: 6px; }
      .qa-question { color: #ff6ac1; font-weight: 500; }
      .qa-answer { color: #a0ffa0; white-space: pre-wrap; }
      .qa-separator { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 8px 0; }
      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-thumb { background: #2a2a44; border-radius: 4px; }
    </style>
    <script src="/claude_stream.js" defer></script>
  </head>
  <body>
    <div class="stream-app">
      <div class="stream-header">
        <span class="stream-title">&#128221; Claude Stream</span>
        <button class="tool-btn" id="btn-copy" title="Copy panel">&#128203; Copy</button>
        <button class="tool-btn" id="btn-save" title="Save panel">&#128190; Save</button>
        <button class="tool-btn danger" id="btn-clear" title="Clear panel">&#10006; Clear</button>
      </div>
      <div class="stream-content" id="qa-panel-content"></div>
    </div>
  </body>
</html>
