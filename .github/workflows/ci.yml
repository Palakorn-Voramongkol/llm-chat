name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Cancel superseded runs on the same ref — only the latest matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Single matrix that fans out to every Rust crate in the repo. Add a project
  # by adding one row — no new job block needed. The `extra_steps` field is a
  # heredoc shell snippet that runs before `cargo`, used here for Tauri's
  # Linux system deps (libwebkit2gtk, etc).
  build:
    name: build / ${{ matrix.project }} (${{ matrix.profile }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        project:
          - manager
          - worker
        profile:
          - debug
          - release
        include:
          # Per-project knobs. Keep these next to the matrix so the table
          # stays one place to look.
          - project: manager
            cargo_path: manager/Cargo.toml
            run_clippy: true
            run_tests: true
            apt_deps: ""
          - project: worker
            cargo_path: worker/Cargo.toml
            run_clippy: false        # tauri-build emits warnings we haven't tackled
            run_tests: false         # no tests in the worker crate yet
            apt_deps: >-
              libwebkit2gtk-4.1-dev
              libgtk-3-dev
              libayatana-appindicator3-dev
              librsvg2-dev
              libsoup-3.0-dev
              libxdo-dev
              patchelf

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ${{ matrix.project }}
          key: ${{ matrix.project }}-${{ matrix.profile }}

      - name: Install system dependencies
        if: matrix.apt_deps != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_deps }}

      # Lint passes only on the debug build of each project — running them on
      # both profiles would just duplicate work.
      - name: rustfmt --check
        if: matrix.profile == 'debug'
        run: cargo fmt --manifest-path ${{ matrix.cargo_path }} --all -- --check

      - name: clippy
        if: matrix.profile == 'debug' && matrix.run_clippy
        run: cargo clippy --manifest-path ${{ matrix.cargo_path }} --all-targets -- -D warnings
        continue-on-error: true   # warning-only for now; flip to false once clean

      - name: Build (${{ matrix.profile }})
        run: |
          flag=""
          [ "${{ matrix.profile }}" = "release" ] && flag="--release"
          cargo build $flag --manifest-path ${{ matrix.cargo_path }}

      - name: Tests
        if: matrix.profile == 'debug' && matrix.run_tests
        run: cargo test --manifest-path ${{ matrix.cargo_path }} --all
