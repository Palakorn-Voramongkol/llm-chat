# nginx vhost for the llm-chat manager. WebSocket-only API; TLS terminated
# here, plaintext to manager on 127.0.0.1:7777.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.palakorn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.palakorn.com;

    ssl_certificate     /etc/letsencrypt/live/api.palakorn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.palakorn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # All endpoints (/chat, /control, /qa/<sid>, /s/<sid>) are WebSocket.
    location / {
        proxy_pass         http://127.0.0.1:7777;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        # Long-lived /chat connections may idle between Q's. Don't kill them.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
