# nginx vhost for Zitadel.
# Drop into /etc/nginx/sites-available/id.palakorn.com and symlink into sites-enabled.

# Map for the WebSocket Upgrade handshake. Required at http-context scope.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name id.palakorn.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name id.palakorn.com;

    ssl_certificate     /etc/letsencrypt/live/id.palakorn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/id.palakorn.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 25m;

    # OIDC ID tokens + Zitadel session cookies can exceed 4 KB; default
    # nginx header buffers will 502/400 without these. Must live at the
    # server scope, not inside a location block.
    large_client_header_buffers 4 16k;

    # Zitadel's Console SPA reads /ui/console/assets/environment.json on boot
    # to discover the API URL. The binary generates it with `http://` even when
    # ExternalSecure=true; rewrite to https here so the SPA's CSP doesn't block
    # its own Auth/Management gRPC calls.
    location = /ui/console/assets/environment.json {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Accept-Encoding "";   # disable compression so sub_filter works
        sub_filter '"http://id.palakorn.com"' '"https://id.palakorn.com"';
        sub_filter_once on;
        sub_filter_types application/json text/plain;
    }

    # Zitadel gRPC / connect-rpc service paths. The login UI talks to these
    # via HTTP/1.1 + gRPC-Web (binary frames + trailers in the body). nginx's
    # default response buffering eats the trailers, so we explicitly disable
    # buffering and don't compress these.
    location ~ ^/zitadel\.[a-z]+\.[a-zA-Z0-9]+\.[A-Za-z]+Service/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_buffering         off;
        proxy_request_buffering off;
        chunked_transfer_encoding off;
        proxy_read_timeout      300s;
    }

    # llm-chat manager API endpoints — share this vhost since Zitadel doesn't
    # use /chat, /control, /qa/, /s/. WS upgrades are forwarded plain to the
    # manager on 127.0.0.1:7777.
    location ~ ^/(chat|control|qa/|s/) {
        proxy_pass         http://127.0.0.1:7777;
        proxy_http_version 1.1;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # v2 login UI — separate Next.js standalone app on 127.0.0.1:3050.
    # Console (/ui/console) bounces through here for auth-request login.
    location /ui/v2/ {
        proxy_pass         http://127.0.0.1:3050;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;
        proxy_read_timeout      300s;
    }

    # Zitadel needs accurate forwarded headers so it builds correct issuer
    # URLs, redirect URIs, JWKS endpoints, and OIDC discovery documents.
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        proxy_buffer_size       16k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        proxy_read_timeout 300s;
    }
}
