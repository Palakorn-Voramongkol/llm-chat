services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  zitadel:
    # PINNED, TO BE CONFIRMED (§4.2/§12): verify this tag exposes the v1
    # Management-API endpoints provision.py calls; never use :latest.
    image: ghcr.io/zitadel/zitadel:v3.4.10
    # Run as root (local-dev only): the FIRSTINSTANCE setup writes the admin-SA
    # JSON key into the shared `machinekey` named volume, which Docker creates
    # root-owned (0755). The image's default `zitadel` user is non-root and
    # cannot create a file there, so the 03_default_instance migration fails
    # with "permission denied" (and every restart then masks it as the instance
    # domain "AlreadyExists"). Running as root lets setup write the key; the
    # provisioner mounts the volume read-only and reads it back.
    user: root
    command: 'start-from-init --masterkeyFromEnv --tlsMode disabled'
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_EXTERNALDOMAIN: host.docker.internal
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      # Required by the `zitadel ready` healthcheck below: without it the ready
      # subcommand probes https://localhost:8080 and fails against our HTTP
      # server (upstream issue #9495). EXTERNALSECURE=false alone does NOT fix
      # the ready check — TLS_ENABLED=false is what flips it to http.
      ZITADEL_TLS_ENABLED: "false"
      # Postgres wiring (B) — discrete admin+user split (§4.1; fallback to (A)).
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_user
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # Bootstrap admin SA — JSON key written once to the machinekey volume.
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: 1
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/zitadel-admin-sa.json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The v3.4.10 image is distroless — no shell, no wget, no curl — so the
      # only usable probe is the bundled binary's own `ready` subcommand (exec
      # form, no shell). It hits /debug/ready; ZITADEL_TLS_ENABLED=false above
      # makes it use http instead of https (issue #9495).
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - machinekey:/machinekey
    restart: unless-stopped

  zitadel-init:
    build:
      context: ./deploy/compose/provisioner
      dockerfile: Dockerfile
    environment:
      PROVISION_ISSUER: http://host.docker.internal:8080
    depends_on:
      zitadel:
        condition: service_healthy
    volumes:
      - machinekey:/machinekey:ro
      - ./secrets:/secrets
      - genenv:/out
    restart: "no"

  manager:
    build:
      context: .
      dockerfile: deploy/compose/manager.Dockerfile
    environment:
      ZITADEL_ISSUER: http://host.docker.internal:8080
      LLM_CHAT_AUTH_TOKEN: ${LLM_CHAT_AUTH_TOKEN}
      MANAGER_BIND: 0.0.0.0
      MANAGER_BACKEND_HOST: host.docker.internal
      MANAGER_BACKEND_PORTS: "7878"
      # Operator-tunable log verbosity (tracing EnvFilter). Default info; set
      # e.g. RUST_LOG=manager::chat=debug,manager::chat::qa=debug in .env to
      # trace the full chat data path.
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "7777:7777"
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    volumes:
      - genenv:/out:ro
    restart: unless-stopped

  admin-api:
    build:
      context: .
      dockerfile: deploy/compose/admin-api.Dockerfile
    environment:
      # Single-issuer linchpin (§3): same literal string the manager uses, so
      # the JWTs the admin verifies share one `iss`. admin-api fails fast at
      # startup if the discovery doc's issuer differs.
      ZITADEL_ISSUER: http://host.docker.internal:8080
      ADMIN_BIND_ADDR: 0.0.0.0:7676
      # admin SA JSON key + OIDC client creds written by the provisioner into
      # the (read-only) secrets mount; never reach the browser or logs. The
      # entrypoint resolves *_FILE -> value and sources /out for project/audience.
      ADMIN_SA_KEY_PATH: /secrets/admin-api-key.json
      ADMIN_OIDC_CLIENT_ID_FILE: /secrets/admin_oidc_client_id
      ADMIN_OIDC_CLIENT_SECRET_FILE: /secrets/admin_oidc_client_secret
      # public_origin is the proxy/web origin (:3000), NOT the BFF's own port:
      # admin-web same-origin-proxies the OIDC nav (/login,/callback,/logout) to
      # the BFF, so the OIDC redirect_uri must stay on :3000 or Zitadel 302s the
      # browser straight to :7676, bypassing the proxy and dropping the pre-auth
      # cookie (scoped to :3000) -> permanent "state mismatch" 403 at /callback.
      # Must equal create_admin_oidc_app's registered redirect (:3000/callback).
      ADMIN_PUBLIC_ORIGIN: http://localhost:3000
      ADMIN_ALLOWED_ORIGIN: http://localhost:3000
      ADMIN_SESSION_KEY: ${ADMIN_SESSION_KEY}
      # Local stack is plain HTTP — the session cookie must NOT be Secure or the
      # browser never sends it back and login silently fails. Production (TLS)
      # omits this so it defaults to Secure=true. (fail-closed default; see
      # config::parse_cookie_secure)
      ADMIN_COOKIE_SECURE: "false"
      # Sessions page: read-only chat-sessions panel via the manager's /control
      # (requires the SA's chat.user+chat.admin grant; /control is chat.admin-only).
      MANAGER_CONTROL_URL: ws://manager:7777/control
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "7676:7676"
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    volumes:
      # project_id + audience (manager.generated.env) and the SA/OIDC secrets.
      - genenv:/out:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped

  admin-web:
    build:
      context: ./admin-web
      dockerfile: ../deploy/compose/admin-web.Dockerfile
    environment:
      NODE_ENV: production
      # next.config rewrites /api,/login,/callback,/logout to this origin
      # (same-origin proxy: no CORS, SameSite=Lax cookie). In-network DNS name.
      ADMIN_API_ORIGIN: http://admin-api:7676
    ports:
      - "3000:3000"
    depends_on:
      admin-api:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  machinekey:
  genenv:
