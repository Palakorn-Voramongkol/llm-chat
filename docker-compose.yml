services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  zitadel:
    # PINNED, TO BE CONFIRMED (§4.2/§12): verify this tag exposes the v1
    # Management-API endpoints provision.py calls; never use :latest.
    image: ghcr.io/zitadel/zitadel:v3.4.10
    # Run as root (local-dev only): the FIRSTINSTANCE setup writes the admin-SA
    # JSON key into the shared `machinekey` named volume, which Docker creates
    # root-owned (0755). The image's default `zitadel` user is non-root and
    # cannot create a file there, so the 03_default_instance migration fails
    # with "permission denied" (and every restart then masks it as the instance
    # domain "AlreadyExists"). Running as root lets setup write the key; the
    # provisioner mounts the volume read-only and reads it back.
    user: root
    command: 'start-from-init --masterkeyFromEnv --tlsMode disabled'
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_EXTERNALDOMAIN: host.docker.internal
      ZITADEL_EXTERNALPORT: 8080
      ZITADEL_EXTERNALSECURE: "false"
      # Required by the `zitadel ready` healthcheck below: without it the ready
      # subcommand probes https://localhost:8080 and fails against our HTTP
      # server (upstream issue #9495). EXTERNALSECURE=false alone does NOT fix
      # the ready check — TLS_ENABLED=false is what flips it to http.
      ZITADEL_TLS_ENABLED: "false"
      # Postgres wiring (B) — discrete admin+user split (§4.1; fallback to (A)).
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel_user
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      # Bootstrap admin SA — JSON key written once to the machinekey volume.
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: zitadel-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Admin
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINEKEY_TYPE: 1
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/zitadel-admin-sa.json
      # SMTP baked into the instance AT CREATION (env-driven from KABY_SMTP_*).
      # Zitadel v3.4.10 does NOT reliably use a runtime Admin-API SMTP config for
      # notifications (SMTPConfig.NotFound); the DefaultInstance config does.
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_HOST: ${KABY_SMTP_HOST:-mailhog}:${KABY_SMTP_PORT:-1025}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_USER: ${KABY_SMTP_USER:-}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_SMTP_PASSWORD: ${KABY_SMTP_PASSWORD:-}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_TLS: ${KABY_SMTP_TLS:-false}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROM: ${KABY_SMTP_SENDER_ADDRESS:-noreply@kabytech.local}
      ZITADEL_DEFAULTINSTANCE_SMTPCONFIGURATION_FROMNAME: ${KABY_SMTP_SENDER_NAME:-kabytech}
      # The sender domain (kabytech.local) differs from ExternalDomain
      # (host.docker.internal), so this MUST be false or Zitadel rejects the From.
      ZITADEL_DEFAULTINSTANCE_DOMAINPOLICY_SMTPSENDERADDRESSMATCHESINSTANCEDOMAIN: "false"
    ports:
      - "127.0.0.1:8080:8080"   # loopback-only: local-dev stack must not be internet-facing
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The v3.4.10 image is distroless — no shell, no wget, no curl — so the
      # only usable probe is the bundled binary's own `ready` subcommand (exec
      # form, no shell). It hits /debug/ready; ZITADEL_TLS_ENABLED=false above
      # makes it use http instead of https (issue #9495).
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - machinekey:/machinekey
    restart: unless-stopped

  zitadel-init:
    build:
      context: ./deploy/compose/provisioner
      dockerfile: Dockerfile
    environment:
      PROVISION_ISSUER: http://host.docker.internal:8080
      # Opt-in Audit (spec §11): set PROVISION_ENABLE_AUDIT=1 (e.g. in .env) to
      # grant the admin SA the instance-level IAM_OWNER_VIEWER role so the
      # Console's Audit page works and survives a clean reset. Off by default
      # (least privilege). Read-only viewer role.
      PROVISION_ENABLE_AUDIT: ${PROVISION_ENABLE_AUDIT:-0}
      # kabytech gateway OIDC client redirect URIs — default to the local-dev
      # frontend origin so login works out of the box; override for prod.
      KABYTECH_OIDC_REDIRECT_URI: ${KABYTECH_OIDC_REDIRECT_URI:-http://localhost:3001/callback}
      KABYTECH_OIDC_POST_LOGOUT_URI: ${KABYTECH_OIDC_POST_LOGOUT_URI:-http://localhost:3001/}
    depends_on:
      zitadel:
        condition: service_healthy
    volumes:
      - machinekey:/machinekey:ro
      - ./secrets:/secrets
      - genenv:/out
    restart: "no"

  manager:
    build:
      context: .
      dockerfile: deploy/compose/manager.Dockerfile
    # Connection config (ZITADEL_ISSUER, MANAGER_BIND, MANAGER_BACKEND_HOST/
    # PORTS) is sole-sourced from the repo-root .env.local; secret + log level
    # stay in environment: below.
    env_file:
      - .env.local
    environment:
      LLM_CHAT_AUTH_TOKEN: ${LLM_CHAT_AUTH_TOKEN}
      # Operator-tunable log verbosity (tracing EnvFilter). Default info; set
      # e.g. RUST_LOG=manager::chat=debug,manager::chat::qa=debug in .env to
      # trace the full chat data path.
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "127.0.0.1:7777:7777"   # loopback-only (local-dev)
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    volumes:
      - genenv:/out:ro
    restart: unless-stopped

  admin-api:
    build:
      context: .
      dockerfile: deploy/compose/admin-api.Dockerfile
    # Connection config (ZITADEL_ISSUER, ADMIN_BIND_ADDR, ADMIN_PUBLIC/ALLOWED_
    # ORIGIN, MANAGER_CONTROL_URL, ADMIN_SA_KEY_PATH + ADMIN_OIDC_*_FILE paths)
    # is sole-sourced from .env.local (see its comments for the origin/redirect
    # rationale). Secrets + the cookie toggle stay in environment: below.
    env_file:
      - .env.local
    environment:
      ADMIN_SESSION_KEY: ${ADMIN_SESSION_KEY}
      # Local stack is plain HTTP — the session cookie must NOT be Secure or the
      # browser never sends it back and login silently fails. Production (TLS)
      # omits this so it defaults to Secure=true. (fail-closed default; see
      # config::parse_cookie_secure)
      ADMIN_COOKIE_SECURE: "false"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "127.0.0.1:7676:7676"   # loopback-only (local-dev)
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    volumes:
      # project_id + audience (manager.generated.env) and the SA/OIDC secrets.
      - genenv:/out:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped

  admin-web:
    build:
      context: ./admin-web
      dockerfile: ../deploy/compose/admin-web.Dockerfile
    # ADMIN_API_ORIGIN (the in-network BFF the Next.js rewrites proxy /api,
    # /login,/callback,/logout to) is sole-sourced from .env.local.
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"   # loopback-only (local-dev)
    depends_on:
      admin-api:
        condition: service_started
    restart: unless-stopped

  # ---- kabytech gateway (end-user login app; design 2026-06-22) ----
  kabytech-backend:
    build:
      context: .
      dockerfile: deploy/compose/kabytech-backend.Dockerfile
    # Connection config (ZITADEL_ISSUER, KABY_BIND_ADDR, KABY_PUBLIC/ALLOWED_
    # ORIGIN, KABY_SA_KEY_PATH) is sole-sourced from .env.local (see its comments
    # for the frontend-origin rationale). Secret + cookie toggle + log stay below.
    env_file:
      - .env.local
    environment:
      KABY_SESSION_KEY: ${KABY_SESSION_KEY}
      # Local stack is plain HTTP — the session cookie must NOT be Secure.
      KABY_COOKIE_SECURE: "false"
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "127.0.0.1:7670:7670"   # loopback-only (local-dev)
    depends_on:
      zitadel-init:
        condition: service_completed_successfully
    volumes:
      - genenv:/out:ro
      - ./secrets:/secrets:ro
    restart: unless-stopped

  kabytech-frontend:
    build:
      context: ./services/kabytech/frontend
      dockerfile: ../../../deploy/compose/kabytech-frontend.Dockerfile
    # KABY_BACKEND_ORIGIN (the in-network backend the frontend proxies to) is
    # sole-sourced from .env.local.
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    ports:
      - "127.0.0.1:3001:3000"   # loopback-only (local-dev)
    depends_on:
      kabytech-backend:
        condition: service_started
    restart: unless-stopped

  # ---- dev SMTP sink for kabytech invite emails (web inbox at :8025) ----
  mailhog:
    image: mailhog/mailhog
    ports:
      - "127.0.0.1:8025:8025"   # web inbox (loopback-only)
    restart: unless-stopped

volumes:
  pgdata:
  # Holds the bootstrap IAM_OWNER SA key (zitadel-admin-sa.json). It is all-
  # powerful and only needed by the provisioner + the one-off runbooks
  # (new_app.py / org_rename.py). SECURITY: after provisioning, rotate/destroy
  # it — `docker compose down -v` wipes it between clean boots; for a long-lived
  # stack, delete the key from this volume once the runtime SA keys exist.
  machinekey:
  genenv:
